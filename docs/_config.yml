title: Content Accessibility Utility on AWS
description: >-
  Audit and remediate WCAG 2.1 / 2.2 accessibility issues in documents with
  generative AI on Amazon Bedrock — via a Python CLI, a Python API, or a
  deployable event-driven pipeline.
lang: en-US

# Rendered with the just-the-docs theme via GitHub Pages' remote_theme support,
# so no theme gem needs to be vendored in the repo.
remote_theme: just-the-docs/just-the-docs@v0.10.0

# Sidebar / search
search_enabled: true
search:
  heading_level: 3
  previews: 3
  tokenizer_separator: /[\s\-/]+/
heading_anchors: true
aux_links:
  "GitHub":
    - "https://github.com/awslabs/content-accessibility-utility-on-aws"
  "PyPI":
    - "https://pypi.org/project/content-accessibility-utility-on-aws/"
aux_links_new_tab: true

# Footer
back_to_top: true
back_to_top_text: "Back to top"
last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

# Default color scheme; a light/dark toggle in the footer lets visitors switch
# (see _includes/nav_footer_custom.html).
color_scheme: light

# Styled callouts (note / warning / important) usable as {: .note } etc.
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: yellow
  warning:
    title: Warning
    color: red

# Repository the "Edit this page on GitHub" links point at
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/awslabs/content-accessibility-utility-on-aws"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "tree"

# Only the guides in this directory are part of the site.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - README.md
  # Diagram build tooling and editable sources — the published SVGs live in
  # assets/img/, so nothing here needs to ship. Keeps the .drawio sources,
  # the generator, and the executable export.sh out of the public site.
  - assets/diagrams

# Kramdown / syntax highlighting
markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
