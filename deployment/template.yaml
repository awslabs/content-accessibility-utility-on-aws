AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Managed accessibility pipeline. A PDF uploaded to the input bucket triggers a
  Lambda that invokes the AgentCore Runtime (deployed separately via the
  agentcore CLI), which converts, audits, and agent-remediates the document and
  writes the accessible result to the output location.

Parameters:
  AgentRuntimeArn:
    Type: String
    Description: >
      ARN of the AgentCore Runtime hosting the pipeline entrypoint. Deploy the
      runtime first with `agentcore launch`, then pass its ARN here.
  InputBucketName:
    Type: String
    Description: Name for the S3 bucket that receives uploaded PDFs.
  OutputPrefix:
    Type: String
    Default: "accessible/"
    Description: Key prefix under which accessible results are written.

Resources:
  # Bucket documents are uploaded to. Output is written to the same bucket under
  # OutputPrefix; the trigger only fires on .pdf keys, so writing HTML output
  # back here does not recurse.
  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref InputBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt TriggerFunction.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: .pdf
    DependsOn: TriggerFunctionS3Permission

  # DynamoDB job-tracking table the batch stage helpers read/write. Name matches
  # the default the code expects (JOB_STATUS_TABLE / "DocumentAccessibilityJobs").
  JobTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: DocumentAccessibilityJobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH

  # Thin S3 -> AgentCore trigger. Does no accessibility work itself.
  TriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: accessibility-pipeline-trigger
      Runtime: python3.12
      Handler: handler.handler
      CodeUri: trigger_lambda/
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          AGENT_RUNTIME_ARN: !Ref AgentRuntimeArn
          OUTPUT_BUCKET: !Ref InputBucketName
          OUTPUT_PREFIX: !Ref OutputPrefix
      Policies:
        - Statement:
            - Sid: InvokeAgentRuntime
              Effect: Allow
              Action: bedrock-agentcore:InvokeAgentRuntime
              Resource: !Ref AgentRuntimeArn

  # Allow S3 to invoke the trigger function (bucket-scoped by account/name to
  # avoid a circular dependency with the bucket resource).
  TriggerFunctionS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TriggerFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub "arn:aws:s3:::${InputBucketName}"

Outputs:
  InputBucket:
    Description: Upload PDFs here to trigger the pipeline.
    Value: !Ref InputBucket
  OutputLocation:
    Description: Accessible results are written under this prefix in the input bucket.
    Value: !Sub "s3://${InputBucketName}/${OutputPrefix}"
  JobTable:
    Description: DynamoDB table tracking per-document job status.
    Value: !Ref JobTable
  TriggerFunction:
    Description: The S3-triggered Lambda that invokes the AgentCore Runtime.
    Value: !Ref TriggerFunction
