name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install package with test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"
    - name: Run offline test suite
      # The default pytest config excludes the AWS-backed AI quality tier
      # (-m "not aws"), so this run is free, offline, and deterministic.
      run: pytest --cov=content_accessibility_utility_on_aws --cov-report=term-missing
