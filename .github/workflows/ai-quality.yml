# AI quality tier — makes REAL Bedrock calls and judges output quality.
# Runs ONLY on explicit manual dispatch (workflow_dispatch): never on push, PR,
# or a schedule, so GitHub CI never makes Bedrock calls on its own. Run it by
# hand from the Actions tab when you want to evaluate model/prompt quality.
# The per-PR gate stays in test.yml and remains free and offline.
name: AI Quality (AWS-backed)

on:
  workflow_dispatch:

permissions:
  id-token: write   # for OIDC role assumption
  contents: read

jobs:
  ai-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: false
    - name: Require AWS_ROLE_ARN
      # Fail loudly rather than silently skipping: a job-level `if` on the var
      # would report the nightly run green while running zero quality tests,
      # masking that the drift-detection tier never actually executed.
      env:
        AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
      run: |
        if [ -z "$AWS_ROLE_ARN" ]; then
          echo "::error::AWS_ROLE_ARN variable is not set; the AI quality tier cannot run."
          exit 1
        fi
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install package with test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ vars.AWS_ROLE_ARN }}
        aws-region: us-east-1
    - name: Run AI quality tier
      env:
        RUN_AWS_TESTS: "1"
        AWS_REGION: us-east-1
      # Treat "no tests collected/ran" (pytest exit 5) as a failure so a gate
      # that silently selects zero tests cannot report success.
      run: pytest -m aws -v -p no:cacheprovider --strict-markers
        || { code=$?; if [ "$code" = "5" ]; then echo "::error::No AI quality tests ran"; fi; exit $code; }
